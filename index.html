<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ShopEase</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>🛒 ShopEase</h1>

<div class="cart">
Cart: <span id="cart-count">0</span>
</div>

</header>

<div class="products">

<div class="product">

<img src="https://via.placeholder.com/200">

<h2>T-Shirt</h2>

<p>₹499</p>

<button onclick="addToCart()">
Add to Cart
</button>

</div>

<div class="product">

<img src="https://via.placeholder.com/200">

<h2>Hoodie</h2>

<p>₹999</p>

<button onclick="addToCart()">
Add to Cart
</button>

</div>

<div class="product">

<img src="https://via.placeholder.com/200">

<h2>Shoes</h2>

<p>₹1499</p>

<button onclick="addToCart()">
Add to Cart
</button>

</div>

</div>

<div class="checkout">

<button class="checkout-btn">
Proceed to Checkout
</button>

</div>

<script src="script.js"></script>

</body>
</html>
